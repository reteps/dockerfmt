on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write
  packages: write

jobs:
  release-docker:
    name: Release Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - uses: ko-build/setup-ko@v0.8
      - name: Build and push Docker image
        run: |
          VERSION=${GITHUB_REF_NAME:-dev}
          TAGS="${VERSION}"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAGS="${VERSION},latest"
          fi
          ko build --bare --tags "${TAGS}" \
            --image-label "org.opencontainers.image.version=${VERSION}" \
            --image-label "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
        env:
          GOFLAGS: -ldflags=-X=github.com/reteps/dockerfmt/cmd.Version=${{ github.ref_name }}
          KO_DEFAULTPLATFORMS: linux/amd64,linux/arm64
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build and publish in parallel: linux/386, linux/amd64, linux/arm64, windows/386, windows/amd64, darwin/amd64, darwin/arm64
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goarch: amd64
            goos: darwin
    steps:
    - uses: actions/checkout@v4
    - uses: wangyoucao577/go-release-action@v1
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        ldflags: -X github.com/reteps/dockerfmt/cmd.Version=${{ github.ref_name }}
  # dockerfmt is pure Go (no cgo), so a CGO_ENABLED=0 build is fully static and
  # already runs on musl-based systems like Alpine. This job re-publishes the
  # static linux binaries under a clearly "musl"-labeled asset name so musl
  # users have an obvious download. The default (glibc-labeled) artifacts above
  # are left untouched.
  releases-musl-matrix:
    name: Release Go Binary (musl)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4
    - uses: wangyoucao577/go-release-action@v1
      env:
        # Guarantee a statically linked binary with no libc dependency.
        CGO_ENABLED: 0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        # Append a "musl" suffix to the default asset name so the static,
        # Alpine-compatible build is easy to identify.
        asset_name: dockerfmt-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}-musl
        ldflags: -X github.com/reteps/dockerfmt/cmd.Version=${{ github.ref_name }}