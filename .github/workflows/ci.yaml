name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - run: go test ./...

  js-test:
    name: JS Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install wasm-opt
        run: sudo apt-get install -y binaryen
      - name: Build and test
        run: |
          cd js
          npm ci
          npm run build
          node --test dist/format.test.js
